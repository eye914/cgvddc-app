<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>이벤트 설정 시안</title>
<style>
  :root{--ink:#2a2a2e;--ink2:#6c6c72;--ink3:#aeaeb4;--bg:#f6f6f8;--card:#fff;--line:#ececf0;--accent:#d8463a;--blue:#4587d6;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:#cdcdd3;font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Malgun Gothic",sans-serif;color:var(--ink);letter-spacing:-.012em;}
  .frame{max-width:412px;margin:0 auto;min-height:100vh;background:var(--bg);padding:16px 14px 30px;}
  .card{background:var(--card);border-radius:22px;border:.5px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.04);padding:16px 16px 18px;}
  .c-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .c-t{font-size:15px;font-weight:800;}
  .stat{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:8px;background:#f9ece9;color:#bf5848;}

  .lab{font-size:10.5px;font-weight:800;color:var(--ink2);margin:0 2px 6px;}
  .wk{width:100%;border:1.5px solid #e6e6ec;border-radius:12px;padding:10px 13px;background:#fff;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .wk-main{font-size:14px;font-weight:800;color:var(--ink);letter-spacing:-.02em;}
  .wk-sub{font-size:11px;font-weight:600;color:var(--ink3);margin-top:2px;}
  .wk .ar{color:var(--ink3);font-size:12px;font-weight:700;}

  .sec{font-size:11px;font-weight:800;color:var(--ink2);margin:4px 2px 9px;display:flex;align-items:center;gap:6px;}
  .sec .ic{font-size:13px;}

  .ev{border:.5px solid var(--line);border-radius:14px;padding:11px 12px;margin-bottom:8px;background:#fff;}
  .ev.wkend{background:#fafbfc;}
  .ev-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .ev-day{font-size:14px;font-weight:800;}
  .ev-day span{font-size:11px;font-weight:600;color:var(--ink3);margin-left:5px;}
  .ev-day.sat{color:#5b8fd0;} .ev-day.sun{color:#cf6b62;}
  .ev-tg{display:flex;gap:7px;align-items:center;}
  .tg{display:flex;align-items:center;gap:6px;}
  .tg span{font-size:10.5px;font-weight:700;color:var(--ink2);}
  .sw{width:38px;height:22px;border-radius:11px;background:#d8d8de;position:relative;cursor:pointer;transition:.15s;flex:0 0 38px;}
  .sw.on{background:var(--blue);} .sw.holi.on{background:#cf6b62;}
  .sw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
  .sw.on i{left:18px;}
  .auto{font-size:10px;font-weight:800;color:var(--blue);background:#eaf1fa;padding:3px 8px;border-radius:7px;}
  .ev-in{width:100%;border:1.5px solid #ececf0;border-radius:10px;padding:9px 11px;font-size:12px;font-weight:600;color:var(--ink);background:#fbfbfc;}
  .ev-in::placeholder{color:#c4c4cc;font-weight:500;}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
  .btn{border:none;border-radius:14px;padding:14px 0;font-size:12.5px;font-weight:800;}
  .btn-r{background:var(--accent);color:#fff;}.btn-g{background:#ececef;color:var(--ink2);}
  .note{font-size:10px;color:var(--ink3);font-weight:600;text-align:center;margin-top:10px;word-break:keep-all;line-height:1.5;}
</style></head>
<body>
<div class="frame">
  <div class="card">
    <div class="c-top"><div class="c-t">📅 스케줄 신청 관리</div><div class="stat">신청 닫힘</div></div>

    <div class="lab">대상 주차</div>
    <div class="wk"><div><div class="wk-main">2026년 6월 2주차</div><div class="wk-sub">6/2(월) ~ 6/8(일)</div></div><span class="ar">변경 ▾</span></div>

    <div class="sec"><span class="ic">🏷️</span><span>이벤트 · 통합모집 설정</span></div>

    <!-- 평일 -->
    <div id="days"></div>

    <div class="btns">
      <button class="btn btn-g">마감</button>
      <button class="btn btn-r">신청 열기 + 알림</button>
    </div>
    <div class="note">통합모집을 켠 평일에는 미소지기 신청 화면에 「통합」 칸이 열립니다. 토·일은 자동 통합. 이벤트명은 시트·신청화면에 함께 표시됩니다.</div>
  </div>
</div>
<script>
  var DAYS=[['월',2,'',false],['화',3,'',false],['수',4,'',false],['목',5,'',false],['금',6,'',false],['토',7,'sat',true],['일',8,'sun',true]];
  // 예시 상태: 월=근로자의날(공휴일), 수=통합모집(단체관람)
  var PRESET={0:{holi:true,name:'근로자의날'},2:{intg:true,name:'단체 관람'}};
  var html='';
  DAYS.forEach(function(d,i){
    var p=PRESET[i]||{};
    var wkend=d[3];
    html+='<div class="ev'+(wkend?' wkend':'')+'">';
    html+='<div class="ev-top"><div class="ev-day '+d[2]+'">'+d[0]+'<span>6/'+d[1]+'</span></div>';
    html+='<div class="ev-tg">';
    if(wkend){ html+='<span class="auto">주말 · 통합 자동</span>'; }
    else { html+='<div class="tg"><span>통합모집</span><div class="sw'+(p.intg?' on':'')+'"><i></i></div></div>'; }
    html+='<div class="tg"><span>공휴일</span><div class="sw holi'+(p.holi?' on':'')+'"><i></i></div></div>';
    html+='</div></div>';
    html+='<input class="ev-in" placeholder="이벤트명 (선택)" value="'+(p.name||'')+'">';
    html+='</div>';
  });
  document.getElementById('days').innerHTML=html;
  document.querySelectorAll('.sw').forEach(function(s){ s.onclick=function(){ s.classList.toggle('on'); }; });
</script>
</body></html>
