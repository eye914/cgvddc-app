<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>arrange 하니스</title></head>
<body style="margin:0;background:#ddd;font-family:sans-serif">
<div style="padding:40px;text-align:center"><button onclick="openArrangeScreen('2026-06-02')" style="padding:14px 22px;font-size:15px;font-weight:800;border:none;border-radius:12px;background:#0f172a;color:#fff">📋 편성 열기 (테스트)</button></div>
<script>
  // ── 목 DB ──
  var DB = {
    staff: [
      {name:'김한솔', pos:['통합'], hours:'5.5', contractDays:5},
      {name:'신민경', pos:['통합'], hours:'5.5', contractDays:5},
      {name:'윤소은', pos:['매점'], hours:'4.5', contractDays:4},
      {name:'홍성현', pos:['통합'], hours:'4.5', contractDays:4},
      {name:'송해인', pos:['매점','플로어'], hours:'4.5', contractDays:4},
      {name:'이예빈', pos:['통합'], hours:'5.5', contractDays:5},
      {name:'조동우', pos:['통합'], hours:'5.5', contractDays:5},
      {name:'손정현', pos:['매점','플로어'], hours:'4.5', contractDays:4}
    ],
    availability: {
      '김한솔': {0:['d','m']}, '신민경': {0:['d','m','n']}, '윤소은': {0:['d']}, '홍성현': {0:['d','m']}
    },
    submitted: ['김한솔','신민경','윤소은','홍성현'],
    assignments: [
      {date:'2026-06-02',dayOfWeek:0,shiftCode:'D1',position:'mart',name:'김한솔',hours:'5.5'},
      {date:'2026-06-02',dayOfWeek:0,shiftCode:'D2',position:'int',name:'신민경',hours:'5.5'},
      {date:'2026-06-02',dayOfWeek:0,shiftCode:'D3',position:'floor',name:'홍성현',hours:'4.5'},
      {date:'2026-06-02',dayOfWeek:0,shiftCode:'M6',position:'mart',name:'송해인',hours:'4.5'},
      {date:'2026-06-02',dayOfWeek:0,shiftCode:'N1',position:'mart',name:'윤소은',hours:'4.5'},
      {date:'2026-06-02',dayOfWeek:0,shiftCode:'N1',position:'int',name:'이예빈',hours:'5.5'}
    ]
  };
  var _origFetch = window.fetch;
  window.fetch = function(url, opts){
    url = String(url);
    if(url.indexOf('/api/arrange')>-1){
      return Promise.resolve({json:function(){ return Promise.resolve({weekKey:'2026-06-02', staff:DB.staff, availability:DB.availability, submitted:DB.submitted, assignments:DB.assignments.slice()}); }});
    }
    if(url.indexOf('/api/schedule')>-1){
      var b = JSON.parse(opts.body);
      if(b.action==='clearDay'){ DB.assignments = DB.assignments.filter(function(a){ return a.date!==b.date; }); return Promise.resolve({json:function(){ return Promise.resolve({ok:true}); }}); }
      DB.assignments = DB.assignments.filter(function(a){ return !(a.date===b.date && a.shiftCode===b.shiftCode && a.position===b.position); });
      if(b.action==='assign') DB.assignments.push({date:b.date,dayOfWeek:b.dayOfWeek,shiftCode:b.shiftCode,position:b.position,name:b.name,hours:String(b.hours)});
      return Promise.resolve({json:function(){ return Promise.resolve({ok:true}); }});
    }
    if(url.indexOf('/api/availability')>-1){
      return Promise.resolve({json:function(){ return Promise.resolve({weekKey:'2026-06-02'}); }});
    }
    return _origFetch.apply(this, arguments);
  };
</script>
<script src="/arrange-ui.js"></script>
</body></html>
