<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>[MOCKUP] 스케줄 편성 - Step 2 관리자 그리드 v3</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --cgv-red:#e71a0f; --cgv-orange:#FF6B00;
    --pos-mart:#fef2f2; --pos-mart-fg:#b91c1c; --pos-mart-bd:#fecaca;
    --pos-mc:#fdf4ff;  --pos-mc-fg:#a21caf;  --pos-mc-bd:#f5d0fe;
    --pos-floor:#f0fdf4; --pos-floor-fg:#15803d; --pos-floor-bd:#bbf7d0;
    --pos-int:#f5f3ff; --pos-int-fg:#6d28d9; --pos-int-bd:#ddd6fe;
    --time-d:#fff7ed; --time-d-fg:#c2410c;
    --time-m:#eff6ff; --time-m-fg:#1d4ed8;
    --time-n:#eef2ff; --time-n-fg:#4338ca;
    --slate-50:#f8fafc; --slate-100:#f1f5f9; --slate-200:#e2e8f0;
    --slate-400:#94a3b8; --slate-500:#64748b; --slate-700:#334155; --slate-900:#0f172a;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:'Pretendard', system-ui, sans-serif; background:#f8fafc; color:var(--slate-900); }
  .wrap { max-width:780px; margin:0 auto; padding-bottom:96px; }

  /* ── 헤더 ── */
  header { background:white; border-bottom:2px solid var(--slate-200); padding:12px 16px; position:sticky; top:0; z-index:20; }
  .h-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
  .brand { font-size:10px; font-weight:900; letter-spacing:0.18em; margin-bottom:2px; }
  .brand .o { color:var(--cgv-orange); } .brand .r { color:var(--cgv-red); }
  .title { font-size:17px; font-weight:900; letter-spacing:-0.03em; line-height:1; }
  .mockup-tag { display:inline-block; margin-left:6px; padding:2px 6px; background:#fef3c7; color:#92400e; font-size:9px; font-weight:900; border-radius:4px; vertical-align:middle; }
  .h-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .action-btn { padding:7px 12px; border:1.5px solid var(--slate-200); background:white; border-radius:9px; font-size:11px; font-weight:900; cursor:pointer; color:var(--slate-700); }
  .action-btn:hover { background:var(--slate-50); }
  .action-btn.primary { background:var(--cgv-red); color:white; border-color:var(--cgv-red); }
  .action-btn.auto { background:#eff6ff; color:#1d4ed8; border-color:#bfdbfe; }
  .action-btn.confirm { background:#f0fdf4; color:#15803d; border-color:#bbf7d0; }

  /* ── 주차 선택 ── */
  .week-bar { display:flex; gap:8px; padding:10px 16px; background:white; border-bottom:1px solid var(--slate-200); overflow-x:auto; align-items:center; }
  .week-bar .lbl { font-size:11px; font-weight:800; color:var(--slate-500); padding-right:4px; white-space:nowrap; }
  .week-chip { flex:0 0 auto; padding:7px 12px; background:var(--slate-100); border:1.5px solid var(--slate-200); border-radius:9px; font-size:11px; font-weight:800; color:var(--slate-500); cursor:pointer; white-space:nowrap; }
  .week-chip.active { background:var(--cgv-red); color:white; border-color:var(--cgv-red); }

  /* ── 요일 내비게이터 (NEW v3) ── */
  .day-nav { display:flex; align-items:center; background:white; border-bottom:1px solid var(--slate-200); padding:8px 4px; gap:0; }
  .nav-arrow { width:34px; flex-shrink:0; background:none; border:none; font-size:22px; font-weight:900; color:var(--slate-400); cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; padding:0; }
  .nav-arrow:hover { color:var(--slate-700); }
  .nav-arrow:disabled { color:var(--slate-200); cursor:default; }
  .day-pills { flex:1; display:flex; gap:2px; overflow-x:auto; scroll-snap-type:x mandatory; padding:0 2px; }
  .day-pills::-webkit-scrollbar { display:none; }
  .day-pill { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; padding:6px 8px; border-radius:10px; cursor:pointer; border:1.5px solid transparent; min-width:40px; scroll-snap-align:center; transition:background .12s; user-select:none; }
  .day-pill:hover { background:var(--slate-100); }
  .day-pill.active { background:var(--cgv-red); border-color:var(--cgv-red); }
  .pill-name { font-size:13px; font-weight:900; color:var(--slate-700); line-height:1.2; }
  .pill-date { font-size:9px; font-weight:700; color:var(--slate-400); line-height:1.2; }
  .pill-cnt { display:inline-block; min-width:16px; padding:1px 4px; margin-top:2px; background:var(--slate-200); color:var(--slate-700); border-radius:8px; font-size:9px; font-weight:900; text-align:center; line-height:1.3; }
  .day-pill.active .pill-name { color:white; }
  .day-pill.active .pill-date { color:rgba(255,255,255,.7); }
  .day-pill.active .pill-cnt { background:rgba(255,255,255,.3); color:white; }
  .day-pill.sat .pill-name { color:#2563eb; }
  .day-pill.sun .pill-name { color:#dc2626; }
  .day-pill.holiday .pill-name { color:#dc2626; }
  .day-pill.active .pill-name { color:white !important; }
  .day-pill.admin-day .pill-date::after { content:' ⚑'; color:#0e7490; }

  /* ── 날짜 정보 바 ── */
  .day-info { padding:8px 16px; background:white; border-bottom:1px solid var(--slate-100); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .di-title { font-size:14px; font-weight:900; }
  .di-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; font-size:10px; font-weight:800; }
  .di-chip.total { background:var(--slate-100); color:var(--slate-700); }
  .di-chip.done  { background:#dcfce7; color:#15803d; }
  .di-chip.miss  { background:#fef2f2; color:#b91c1c; }

  /* ── 관리자 공지 ── */
  .admin-notice { margin:8px 16px 0; padding:8px 11px; background:#ecfeff; border:1px solid #a5f3fc; border-radius:9px; font-size:11px; color:#155e75; font-weight:700; display:flex; gap:6px; align-items:center; }

  /* ── 그리드 ── */
  .grid-wrap { padding:10px 16px; }
  .grid { width:100%; border-collapse:separate; border-spacing:0; font-size:11px; background:white; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.04); border:1px solid var(--slate-200); }
  .grid th, .grid td { padding:0; text-align:center; vertical-align:middle; }
  .grid thead th { background:var(--slate-50); padding:8px 4px; font-size:11px; font-weight:900; color:var(--slate-700); border-bottom:1px solid var(--slate-200); line-height:1.3; }
  .th-sub { display:block; font-size:8px; font-weight:700; color:var(--slate-400); margin-top:2px; }
  .grid thead th.pos-mart-mc { background:linear-gradient(160deg,var(--pos-mart) 50%,var(--pos-mc) 50%); }
  .grid thead th.pos-mart-mc .th-mart { color:var(--pos-mart-fg); }
  .grid thead th.pos-mart-mc .th-mc   { color:var(--pos-mc-fg); }
  .grid thead th.pos-floor { background:var(--pos-floor); color:var(--pos-floor-fg); }
  .grid thead th.pos-int   { background:var(--pos-int);   color:var(--pos-int-fg); }

  .row-time { background:var(--slate-50); padding:7px 6px !important; font-size:11px; font-weight:900; text-align:center; border-right:1px solid var(--slate-200); border-top:1px solid var(--slate-100); width:72px; }
  .row-time .t-code { display:block; font-weight:900; font-size:12px; }
  .row-time .t-code.d { color:var(--time-d-fg); }
  .row-time .t-code.m { color:var(--time-m-fg); }
  .row-time .t-code.n { color:var(--time-n-fg); }
  .row-time .t-range { display:block; font-size:9px; color:var(--slate-400); font-weight:700; margin-top:1px; letter-spacing:-0.02em; }

  .cell { border-top:1px solid var(--slate-100); border-left:1px solid var(--slate-100); padding:4px 2px; min-height:42px; height:42px; cursor:pointer; position:relative; }
  .cell:hover { background:#fefce8; }
  .cell.mc-n-cell { background:#fdf4ff33; } /* N행 매감 세포 - 매우 연한 보라 */
  .cell.mc-n-cell:hover { background:#f3e8ff55; }
  .cell.assigned { background:#fef2f2; }
  .cell.assigned.mc-n-cell { background:#fdf4ff; }
  .cell .nm { display:block; font-size:12px; font-weight:900; line-height:1.2; }
  .cell .meta { display:block; font-size:9px; color:var(--slate-400); font-weight:700; line-height:1; margin-top:1px; }
  .cell .pos-sub { display:block; font-size:8px; font-weight:800; color:var(--pos-mc-fg); opacity:.7; margin-top:1px; }
  .cell .nm.h55 { color:#6d28d9; }
  .cell .nm.h45 { color:#1d4ed8; }
  .cell.assigned .nm { color:var(--cgv-red); }
  .cell.assigned.mc-n-cell .nm { color:var(--pos-mc-fg); }
  .cell .empty { color:var(--slate-300); font-size:14px; font-weight:900; }

  /* ── 모달 ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(15,23,42,.5); display:none; z-index:50; align-items:center; justify-content:center; padding:14px; }
  .modal-overlay.show { display:flex; }
  .modal { background:white; border-radius:16px; width:100%; max-width:500px; max-height:84vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .modal-head { padding:14px 16px 12px; border-bottom:1px solid var(--slate-200); display:flex; justify-content:space-between; align-items:flex-start; }
  .modal-title { font-size:15px; font-weight:900; }
  .modal-subtitle { font-size:11px; color:var(--slate-500); font-weight:700; margin-top:3px; }
  .modal-close { background:none; border:none; font-size:22px; color:var(--slate-400); cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0; }
  .modal-search { padding:10px 16px; border-bottom:1px solid var(--slate-100); }
  .modal-search input { width:100%; padding:8px 12px; border:1.5px solid var(--slate-200); border-radius:10px; font-size:13px; font-family:inherit; }
  .modal-search input:focus { outline:none; border-color:var(--cgv-red); }
  .modal-tabs { display:flex; gap:0; padding:0 16px; border-bottom:1px solid var(--slate-200); }
  .m-tab { flex:1; padding:10px 4px; font-size:11px; font-weight:900; color:var(--slate-500); cursor:pointer; text-align:center; border-bottom:2.5px solid transparent; }
  .m-tab.active { color:var(--cgv-red); border-bottom-color:var(--cgv-red); }
  .m-tab .ct { display:inline-block; min-width:18px; padding:1px 5px; margin-left:4px; background:var(--slate-200); color:var(--slate-700); border-radius:9px; font-size:9px; font-weight:900; text-align:center; }
  .m-tab.active .ct { background:var(--cgv-red); color:white; }

  .modal-body { overflow-y:auto; flex:1; }
  .list-divider { padding:6px 16px 4px; background:var(--slate-50); border-bottom:1px solid var(--slate-100); font-size:10px; font-weight:900; color:var(--slate-400); letter-spacing:0.05em; display:flex; align-items:center; gap:6px; }
  .list-divider::after { content:''; flex:1; height:1px; background:var(--slate-200); }

  .miso-item { display:flex; align-items:center; gap:10px; padding:11px 16px; border-bottom:1px solid var(--slate-100); cursor:pointer; }
  .miso-item:hover { background:var(--slate-50); }
  .miso-item.selected { background:#fef2f2; }
  .miso-radio { width:18px; height:18px; border:2px solid var(--slate-300); border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .miso-item.selected .miso-radio { border-color:var(--cgv-red); background:var(--cgv-red); }
  .miso-item.selected .miso-radio::after { content:''; width:6px; height:6px; background:white; border-radius:50%; }
  .miso-info { flex:1; min-width:0; }
  .miso-name-row { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .miso-name { font-size:13px; font-weight:900; }
  .h-tag { display:inline-block; padding:1px 6px; border-radius:5px; font-size:9px; font-weight:900; }
  .h-tag.h55 { background:#f5f3ff; color:#6d28d9; }
  .h-tag.h45 { background:#eff6ff; color:#1d4ed8; }
  .apply-tag { font-size:9px; font-weight:900; padding:2px 6px; border-radius:4px; }
  .tag-applied  { background:#ecfeff; color:#0e7490; }
  .tag-noapply  { background:var(--slate-100); color:var(--slate-500); }
  .miso-meta { font-size:10px; color:var(--slate-500); font-weight:700; margin-top:3px; }
  .miso-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .progress-text { font-size:11px; font-weight:900; padding:3px 8px; border-radius:6px; white-space:nowrap; }
  .mp-0   { background:#f0fdf4; color:#15803d; }
  .mp-mid { background:#fffbeb; color:#92400e; }
  .mp-full{ background:#fef2f2; color:#dc2626; }
  .progress-bar-wrap { width:52px; height:4px; background:var(--slate-100); border-radius:2px; overflow:hidden; }
  .progress-bar { height:100%; border-radius:2px; }
  .pb-0   { background:#22c55e; }
  .pb-mid { background:#f59e0b; }
  .pb-full{ background:#ef4444; }

  .modal-foot { padding:12px 16px; border-top:1px solid var(--slate-200); display:flex; gap:8px; align-items:center; background:var(--slate-50); }
  .foot-info { flex:1; font-size:11px; color:var(--slate-500); font-weight:700; line-height:1.4; }
  .foot-info b { color:var(--slate-900); font-weight:900; }
  .btn-delete { padding:9px 14px; background:white; color:var(--slate-700); border:1.5px solid var(--slate-300); border-radius:9px; font-size:12px; font-weight:900; cursor:pointer; }
  .btn-save { padding:9px 20px; background:var(--cgv-red); color:white; border:none; border-radius:9px; font-size:12px; font-weight:900; cursor:pointer; }
  .btn-save:hover { opacity:.9; }

  /* ── 하단 확정 바 ── */
  .confirm-bar { position:fixed; bottom:0; left:0; right:0; padding:12px 16px calc(12px + env(safe-area-inset-bottom)); background:white; border-top:1px solid var(--slate-200); box-shadow:0 -2px 12px rgba(0,0,0,.06); z-index:10; }
  .cb-max { max-width:780px; margin:0 auto; display:flex; gap:10px; align-items:center; }
  .cb-stats { flex:1; font-size:11px; color:var(--slate-500); font-weight:700; line-height:1.5; }
  .cb-stats b { color:var(--slate-900); font-weight:900; }
  .cb-stats .warn { color:var(--cgv-red); }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <header>
    <div class="h-top">
      <div>
        <div class="brand"><span class="o">CGV </span><span class="r"> DONGDUCHEON STAFF</span></div>
        <div class="title">스케줄 편성 <span class="mockup-tag">MOCKUP v3 · 관리자</span></div>
      </div>
      <div class="h-actions">
        <button class="action-btn auto">⚡ 자동편성</button>
        <button class="action-btn">전주 복사</button>
        <button class="action-btn">저장</button>
        <button class="action-btn confirm">✓ 확정·시트동기화</button>
      </div>
    </div>
  </header>

  <!-- 주차 선택 -->
  <div class="week-bar">
    <span class="lbl">대상 주차</span>
    <div class="week-chip">전주 (5/19~5/25)</div>
    <div class="week-chip active">이번주 (5/26~6/1)</div>
    <div class="week-chip">다음주 (6/2~6/8)</div>
    <div class="week-chip">+2주 (6/9~6/15)</div>
    <span style="flex:1"></span>
    <button class="action-btn" style="font-size:10px;padding:5px 10px;flex-shrink:0">⚑ 통합모집일 설정</button>
  </div>

  <!-- ★ 요일 내비게이터 (v3 신규) -->
  <div class="day-nav">
    <button class="nav-arrow" id="navPrev" onclick="shiftDay(-1)">‹</button>
    <div class="day-pills" id="dayPills"></div>
    <button class="nav-arrow" id="navNext" onclick="shiftDay(1)">›</button>
  </div>

  <!-- 날짜 정보 바 -->
  <div class="day-info" id="dayInfo"></div>

  <!-- 관리자 지정일 공지 -->
  <div class="admin-notice" id="adminNotice" style="display:none">
    <span>⚑</span><span><b>관리자 지정 모집일:</b> 단체 손님 예정 — 통합 포지션 추가 모집</span>
  </div>

  <!-- 편성 그리드 -->
  <div class="grid-wrap">
    <table class="grid">
      <thead>
        <tr>
          <th style="width:72px;background:var(--slate-50);color:var(--slate-500);font-size:10px">시간대&nbsp;\&nbsp;포지션</th>
          <th class="pos-mart-mc">
            <span class="th-mart">매점</span> / <span class="th-mc">매감</span>
            <span class="th-sub">D·M = 매점 &nbsp;|&nbsp; N = 매감</span>
          </th>
          <th class="pos-floor">플로어</th>
          <th class="pos-int">통합</th>
        </tr>
      </thead>
      <tbody id="gridBody"></tbody>
    </table>
  </div>

</div><!-- /.wrap -->

<!-- ── 후보 선택 모달 ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="modalTitle">스케줄 대상자 선택</div>
        <div class="modal-subtitle" id="modalSubtitle"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-search">
      <input type="text" id="searchInput" placeholder="미소지기 이름 검색..." oninput="onSearch(this.value)">
    </div>
    <div class="modal-tabs">
      <div class="m-tab active" id="tabApplied" onclick="switchTab('applied')">
        신청자<span class="ct" id="cntApplied">0</span>
      </div>
      <div class="m-tab" id="tabAll" onclick="switchTab('all')">
        전체 자격자<span class="ct" id="cntAll">0</span>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <div class="foot-info">현재 배정: <b id="curAssign">미배정</b></div>
      <button class="btn-delete" onclick="clearAssign()">배정 해제</button>
      <button class="btn-save" onclick="saveAssign()">저장</button>
    </div>
  </div>
</div>

<!-- 하단 확정 바 -->
<div class="confirm-bar">
  <div class="cb-max">
    <div class="cb-stats" id="cbStats"></div>
    <button class="action-btn confirm" onclick="alert('저장합니다 (데모)')">선택 요일 저장</button>
  </div>
</div>

<script>
// ===== 목 데이터 =====
var BASE_DATE   = new Date(2026, 4, 26); // 5/26 월요일
var DAY_KOR     = ['월','화','수','목','금','토','일'];
var HOLIDAYS    = []; // 공휴일 dayIdx
var ADMIN_INT_DAYS = [3]; // 목요일 = 관리자 지정 통합 모집

// ── 시간대 정의 ──
var TIMES = [
  { code:'D1', kind:'d', range55:'09:00~14:30', range45:'09:00~13:30' },
  { code:'D2', kind:'d', range55:'09:30~15:00', range45:'09:30~14:00' },
  { code:'D3', kind:'d', range55:'10:00~15:30', range45:'10:00~14:30' },
  { code:'D4', kind:'d', range55:'10:30~16:00', range45:'10:30~15:00' },
  { code:'M1', kind:'m', range55:'11:30~17:00', range45:'11:30~16:00' },
  { code:'M2', kind:'m', range55:'12:00~17:30', range45:'12:00~16:30' },
  { code:'M3', kind:'m', range55:'12:30~18:00', range45:'12:30~17:00' },
  { code:'M4', kind:'m', range55:'13:00~18:30', range45:'13:00~17:30' },
  { code:'M5', kind:'m', range55:'14:00~19:30', range45:'14:00~18:30' },
  { code:'M6', kind:'m', range55:'15:00~20:30', range45:'15:00~19:30' },
  { code:'M7', kind:'m', range55:'15:30~21:00', range45:'15:30~20:00' },
  { code:'M8', kind:'m', range55:'16:30~22:00', range45:'16:30~21:00' },
  { code:'N1', kind:'n', range55:'18:00~23:30', range45:'19:00~23:30' },
  { code:'N2', kind:'n', range55:'19:00~24:30', range45:'20:00~24:30' }
];

// ── 포지션 정의 (3열 — 매점/매감 통합) ──
// mart_mc 열: D/M행 → 실제 'mart', N행 → 실제 'mart-close'
var POSITIONS = [
  {
    id: 'mart_mc',
    label: '매점/매감',
    tg: ['d','m','n'], // 항상 활성
    actualId: function(kind) { return kind === 'n' ? 'mart-close' : 'mart'; }
  },
  { id:'floor', label:'플로어', tg:['d','m','n'] },
  { id:'int',   label:'통합',   tg:['d','m','n'] }
];

// ── 미소지기 마스터 ──
var MISO = [
  { name:'김한솔', hours:5.5, qual:['mart','mart-close','floor','int'], contractDays:5 },
  { name:'신재용', hours:5.5, qual:['mart','mart-close','floor','int'], contractDays:5 },
  { name:'신민경', hours:5.5, qual:['mart','mart-close','floor','int'], contractDays:5 },
  { name:'이예빈', hours:5.5, qual:['mart','mart-close','floor','int'], contractDays:5 },
  { name:'홍성현', hours:4.5, qual:['mart','mart-close','floor','int'], contractDays:4 },
  { name:'홍민경', hours:4.5, qual:['mart','mart-close','floor','int'], contractDays:4 },
  { name:'김나은', hours:4.5, qual:['mart','mart-close','floor','int'], contractDays:4 },
  { name:'손정현', hours:4.5, qual:['mart','floor'],                    contractDays:5 },
  { name:'이하율', hours:4.5, qual:['mart','floor'],                    contractDays:5 }
];

// ── 배정 데이터 ──
var assignments = {
  '0:M3:mart':       { name:'홍성현', hours:4.5 },
  '0:M5:mart':       { name:'김한솔', hours:5.5 },
  '0:N1:mart-close': { name:'홍민경', hours:4.5 },
  '0:D4:floor':      { name:'손정현', hours:4.5 },
  '0:M7:floor':      { name:'이하율', hours:4.5 },
  '0:N1:floor':      { name:'김나은', hours:4.5 }
};

// ── 신청 데이터 (해당 시간대에 신청한 미소지기) ──
var applications = {
  '0:m:mart':       ['홍성현','김한솔','신민경'],
  '0:n:mart-close': ['홍민경','이예빈','신재용'],
  '0:m:floor':      ['이하율','손정현','김한솔'],
  '0:n:floor':      ['김나은','홍민경'],
  '0:d:mart':       ['신민경','이예빈','신재용'],
  '0:d:floor':      ['손정현','이하율']
};

// ── 현재 주간 배정 일수 ──
function weekAssignedDays(name) {
  var days = {};
  Object.keys(assignments).forEach(function(k) {
    if (assignments[k] && assignments[k].name === name) {
      days[k.split(':')[0]] = true;
    }
  });
  return Object.keys(days).length;
}

var activeDay = 0;

function isWeekend(i) { return i >= 4; }
function isHoliday(i) { return HOLIDAYS.indexOf(i) > -1; }

function dayAssignedCount(idx) {
  return Object.keys(assignments).filter(function(k) {
    return k.indexOf(idx + ':') === 0 && assignments[k];
  }).length;
}

// ── 요일 내비게이터 렌더 ──
function renderDayNav() {
  var html = '';
  for (var i = 0; i < 7; i++) {
    var d = new Date(BASE_DATE); d.setDate(BASE_DATE.getDate() + i);
    var dateStr = (d.getMonth()+1) + '/' + d.getDate();
    var cls = '';
    if (i === 5) cls += ' sat';
    if (i === 6) cls += ' sun';
    if (isHoliday(i)) cls += ' holiday';
    if (ADMIN_INT_DAYS.indexOf(i) > -1) cls += ' admin-day';
    if (i === activeDay) cls += ' active';
    var cnt = dayAssignedCount(i);
    html += '<div class="day-pill' + cls + '" onclick="setDay(' + i + ')" id="pill' + i + '">';
    html += '<span class="pill-name">' + DAY_KOR[i] + '</span>';
    html += '<span class="pill-date">' + dateStr + '</span>';
    html += '<span class="pill-cnt">' + cnt + '</span>';
    html += '</div>';
  }
  document.getElementById('dayPills').innerHTML = html;
  // 활성 pill이 보이도록 스크롤
  var activePill = document.getElementById('pill' + activeDay);
  if (activePill) activePill.scrollIntoView({ inline:'center', behavior:'smooth', block:'nearest' });

  document.getElementById('navPrev').disabled = (activeDay === 0);
  document.getElementById('navNext').disabled = (activeDay === 6);
}

// ── 날짜 정보 바 렌더 ──
function renderDayInfo() {
  var d = new Date(BASE_DATE); d.setDate(BASE_DATE.getDate() + activeDay);
  var dateStr = (d.getMonth()+1) + '/' + d.getDate();
  var weekend = isWeekend(activeDay);
  var slots = 0, assigned = 0;
  TIMES.forEach(function(t) {
    POSITIONS.forEach(function(p) {
      slots++;
      var actualId = p.actualId ? p.actualId(t.kind) : p.id;
      if (assignments[activeDay + ':' + t.code + ':' + actualId]) assigned++;
    });
  });

  var html = '<div class="di-title">' + DAY_KOR[activeDay] + '요일 ' + dateStr;
  html += ' <span style="font-size:11px;color:var(--slate-400);font-weight:700">(' + (weekend ? '주말' : '평일') + ')</span></div>';
  html += '<div style="display:flex;gap:5px;flex-wrap:wrap">';
  html += '<span class="di-chip total">가능 ' + slots + '</span>';
  html += '<span class="di-chip done">배정 ' + assigned + '</span>';
  if (assigned < slots) html += '<span class="di-chip miss">미배정 ' + (slots - assigned) + '</span>';
  html += '</div>';
  document.getElementById('dayInfo').innerHTML = html;
  document.getElementById('adminNotice').style.display =
    ADMIN_INT_DAYS.indexOf(activeDay) > -1 ? 'flex' : 'none';

  // 하단 바
  var weekAssigned = Object.keys(assignments).filter(function(k){ return !!assignments[k]; }).length;
  var cb = '<b>' + DAY_KOR[activeDay] + ' ' + dateStr + '</b> · 배정 <b>' + assigned + '</b>건 / 가능 ' + slots + '건<br>';
  cb += '<span style="opacity:.7">주간 총 <b>' + weekAssigned + '</b>건 배정됨 &nbsp;·&nbsp; 시트 예: <b>26년6월1주차(맞교대)</b></span>';
  document.getElementById('cbStats').innerHTML = cb;
}

// ── 그리드 렌더 ──
function renderGrid() {
  var html = '';
  TIMES.forEach(function(t) {
    html += '<tr>';
    html += '<td class="row-time"><span class="t-code ' + t.kind + '">' + t.code + '</span>';
    html += '<span class="t-range">' + t.range55 + '</span></td>';
    POSITIONS.forEach(function(p) {
      var actualId = p.actualId ? p.actualId(t.kind) : p.id;
      var key = activeDay + ':' + t.code + ':' + actualId;
      var a   = assignments[key];
      // mart_mc 열 N행 = 매감 시각 표시
      var isMcN = (p.id === 'mart_mc' && t.kind === 'n');
      var extraCls = isMcN ? ' mc-n-cell' : '';

      if (a) {
        var hcls = a.hours >= 5.5 ? 'h55' : 'h45';
        html += '<td class="cell assigned' + extraCls + '" onclick="openModal(\'' + key + '\')">';
        html += '<span class="nm ' + hcls + '">' + a.name + '</span>';
        if (a.hours < 5.5) html += '<span class="meta">(' + t.range45 + ')</span>';
        if (isMcN) html += '<span class="pos-sub">매감</span>';
        html += '</td>';
      } else {
        html += '<td class="cell' + extraCls + '" onclick="openModal(\'' + key + '\')">';
        html += '<span class="empty">+</span>';
        if (isMcN) html += '<span class="pos-sub">매감</span>';
        html += '</td>';
      }
    });
    html += '</tr>';
  });
  document.getElementById('gridBody').innerHTML = html;
}

function setDay(idx) {
  activeDay = idx;
  renderDayNav();
  renderDayInfo();
  renderGrid();
}
function shiftDay(delta) {
  var next = activeDay + delta;
  if (next >= 0 && next <= 6) setDay(next);
}

// ===== 모달 =====
var modalCtx     = null;
var _modalTab    = 'applied';
var _listApplied = [];
var _listAll     = [];

function openModal(cellKey) {
  modalCtx  = cellKey;
  _modalTab = 'applied';
  document.getElementById('searchInput').value = '';

  var parts   = cellKey.split(':');
  var dayIdx  = +parts[0];
  var timeCode= parts[1];
  var posId   = parts[2]; // 실제 posId ('mart' / 'mart-close' / 'floor' / 'int')

  var time = TIMES.find(function(t){ return t.code === timeCode; });
  var d    = new Date(BASE_DATE); d.setDate(BASE_DATE.getDate() + dayIdx);
  var dateStr = (d.getMonth()+1) + '/' + d.getDate();
  var posLabel = posId === 'mart' ? '매점' : posId === 'mart-close' ? '매감' : posId === 'floor' ? '플로어' : '통합';
  document.getElementById('modalTitle').textContent    = '스케줄 대상자 선택';
  document.getElementById('modalSubtitle').textContent = DAY_KOR[dayIdx] + '요일 ' + dateStr + ' · ' + time.code + ' (' + time.range55 + ') · ' + posLabel;

  var cur = assignments[cellKey];
  document.getElementById('curAssign').textContent = cur ? (cur.name + ' (' + cur.hours + 'h)') : '미배정';

  // 신청자 목록
  var appliedKey = dayIdx + ':' + time.kind + ':' + posId;
  var appliedNames = applications[appliedKey] || [];

  _listApplied = [];
  _listAll     = [];
  MISO.forEach(function(m) {
    if (m.qual.indexOf(posId) === -1) return;
    var item = { m:m, applied: appliedNames.indexOf(m.name) > -1, assignedDays: weekAssignedDays(m.name) };
    _listAll.push(item);
    if (item.applied) _listApplied.push(item);
  });
  // 신청자 탭: 배정 적은 순 → 이름 순
  function sortApplied(arr) {
    return arr.slice().sort(function(a,b){
      if (a.assignedDays !== b.assignedDays) return a.assignedDays - b.assignedDays;
      return a.m.name.localeCompare(b.m.name);
    });
  }
  // 전체 탭: 신청자 먼저 → 각 그룹 내 배정 적은 순 → 이름 순
  function sortAll(arr) {
    return arr.slice().sort(function(a,b){
      if (a.applied !== b.applied) return a.applied ? -1 : 1;
      if (a.assignedDays !== b.assignedDays) return a.assignedDays - b.assignedDays;
      return a.m.name.localeCompare(b.m.name);
    });
  }
  _listApplied = sortApplied(_listApplied);
  _listAll     = sortAll(_listAll);

  document.getElementById('cntApplied').textContent = _listApplied.length;
  document.getElementById('cntAll').textContent     = _listAll.length;

  // 탭 초기화
  document.getElementById('tabApplied').classList.add('active');
  document.getElementById('tabAll').classList.remove('active');
  renderMisoList(_listApplied, false, cur ? cur.name : null);
  document.getElementById('modal').classList.add('show');
}

function switchTab(tab) {
  _modalTab = tab;
  document.getElementById('tabApplied').classList.toggle('active', tab === 'applied');
  document.getElementById('tabAll').classList.toggle('active',     tab === 'all');
  document.getElementById('searchInput').value = '';
  var cur = assignments[modalCtx];
  if (tab === 'applied') {
    renderMisoList(_listApplied, false, cur ? cur.name : null);
  } else {
    renderMisoList(_listAll, true, cur ? cur.name : null);
  }
}

function onSearch(q) {
  var cur  = assignments[modalCtx];
  var list = _modalTab === 'applied' ? _listApplied : _listAll;
  var filtered = q.trim() === '' ? list : list.filter(function(it){
    return it.m.name.indexOf(q.trim()) > -1;
  });
  renderMisoList(filtered, _modalTab === 'all', cur ? cur.name : null);
}

function renderMisoList(list, showDivider, selectedName) {
  if (list.length === 0) {
    document.getElementById('modalBody').innerHTML =
      '<div style="padding:24px 16px;text-align:center;color:var(--slate-400);font-size:12px;font-weight:700">해당하는 미소지기가 없습니다</div>';
    return;
  }

  var html = '';
  var didDivide = false;

  list.forEach(function(it, idx) {
    // '전체' 탭: 신청자 → 미신청 경계에 구분선
    if (showDivider && !didDivide && !it.applied) {
      if (idx > 0) html += '<div class="list-divider">미신청 자격자</div>';
      didDivide = true;
    }
    if (showDivider && idx === 0 && it.applied) {
      html += '<div class="list-divider">신청자</div>';
    }

    var m    = it.m;
    var hcls = m.hours >= 5.5 ? 'h55' : 'h45';
    var sel  = (m.name === selectedName) ? ' selected' : '';
    var qLabel = m.qual.map(function(q){
      return {mart:'매점','mart-close':'매감',floor:'플로어',int:'통합'}[q] || q;
    }).join('·');
    var ratio  = m.contractDays > 0 ? it.assignedDays / m.contractDays : 0;
    var pcls   = ratio === 0 ? 'mp-0' : (ratio < 1 ? 'mp-mid' : 'mp-full');
    var pbcls  = ratio === 0 ? 'pb-0' : (ratio < 1 ? 'pb-mid' : 'pb-full');
    var pct    = Math.min(ratio * 100, 100);

    html += '<div class="miso-item' + sel + '" onclick="pick(\'' + m.name + '\')">';
    html += '<div class="miso-radio"></div>';
    html += '<div class="miso-info">';
    html += '<div class="miso-name-row">';
    html += '<span class="miso-name">' + m.name + '</span>';
    html += '<span class="h-tag ' + hcls + '">' + m.hours + 'h</span>';
    html += '<span class="apply-tag ' + (it.applied ? 'tag-applied' : 'tag-noapply') + '">';
    html += (it.applied ? '신청' : '미신청') + '</span>';
    html += '</div>';
    html += '<div class="miso-meta">자격: ' + qLabel + ' &nbsp;·&nbsp; 계약 ' + m.contractDays + '일</div>';
    html += '</div>';
    html += '<div class="miso-right">';
    html += '<span class="progress-text ' + pcls + '">' + it.assignedDays + '/' + m.contractDays + '일</span>';
    html += '<div class="progress-bar-wrap"><div class="progress-bar ' + pbcls + '" style="width:' + pct + '%"></div></div>';
    html += '</div>';
    html += '</div>';
  });
  document.getElementById('modalBody').innerHTML = html;
}

function pick(name) {
  document.querySelectorAll('.miso-item').forEach(function(el) {
    var nm = el.querySelector('.miso-name');
    el.classList.toggle('selected', nm && nm.textContent === name);
  });
  document.getElementById('curAssign').textContent = name + ' (선택 중)';
}

function saveAssign() {
  alert('배정 저장 (데모)\n선택된 미소지기가 저장됩니다.');
  closeModal();
}
function clearAssign() {
  if (modalCtx && assignments[modalCtx]) {
    delete assignments[modalCtx];
    renderDayNav();
    renderDayInfo();
    renderGrid();
  }
  closeModal();
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  modalCtx = null;
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── 초기 렌더 ──
renderDayNav();
renderDayInfo();
renderGrid();
</script>
</body>
</html>
