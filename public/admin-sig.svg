<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 210" fill="none">

  <!-- ── 타원 루프 (반시계, 기울어짐) ── -->
  <ellipse cx="95" cy="110" rx="64" ry="38"
    transform="rotate(-30 95 110)"
    stroke="#0d0d0d" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"
    fill="none"/>

  <!-- ── 李 상단: 木 ── -->
  <!-- 가로획: 완만한 곡선 -->
  <path d="M 64 86 Q 93 81 122 79"
    stroke="#0d0d0d" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- 세로획 -->
  <line x1="93" y1="63" x2="93" y2="115"
    stroke="#0d0d0d" stroke-width="5" stroke-linecap="round"/>
  <!-- 왼쪽 삐침 (撇): 곡선으로 자연스럽게 -->
  <path d="M 93 91 Q 81 106 63 120"
    stroke="#0d0d0d" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- 오른쪽 파임 (捺): 곡선 -->
  <path d="M 93 91 Q 105 103 119 114"
    stroke="#0d0d0d" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- ── 李 하단: 子 (필기체) ── -->
  <!-- 윗 가로 꺾임 -->
  <path d="M 80 124 Q 93 118 107 124"
    stroke="#0d0d0d" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- 세로획 -->
  <line x1="93" y1="121" x2="93" y2="141"
    stroke="#0d0d0d" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 아래 가로획 -->
  <line x1="80" y1="141" x2="106" y2="141"
    stroke="#0d0d0d" stroke-width="4.5" stroke-linecap="round"/>

  <!-- ── 대각선 사선 획 (서명 핵심, 약간 곡선) ── -->
  <path d="M 47 51 Q 97 113 149 173"
    stroke="#0d0d0d" stroke-width="13" stroke-linecap="round" fill="none"/>

</svg>
